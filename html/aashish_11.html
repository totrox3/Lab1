<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystery Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    nav {
      background-color: rgb(24, 24, 128);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 50px;
    }
    .logo { color: white; font-size: 18px; font-weight: bold; }
    .nav-links { list-style: none; display: flex; gap: 20px; }
    .nav-links a { color: white; text-decoration: none; font-size: 14px; }
    .menu-btn {
      display: none;
      border: 1px solid white;
      color: white;
      background: transparent;
      padding: 4px 10px;
      font-size: 13px;
      border-radius: 3px;
    }
    .mobile-menu { display: none; background-color: #1a2a3a; }
    .mobile-menu a {
      display: block;
      text-align: center;
      color: white;
      text-decoration: none;
      padding: 12px 0;
      border-top: 1px solid #2e4057;
      font-size: 15px;
    }
    @media (max-width: 600px) {
      .nav-links { display: none; }
      .menu-btn { display: block; }
      .mobile-menu { display: block; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Mystery Code</div>
    <button class="menu-btn">Menu</button>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
  </nav>
  <div class="mobile-menu">
    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Service</a>
    <a href="#">Portfolio</a>
    <a href="#">Blog</a>
    <a href="#">Contact Us</a>
  </div>
</body>
</html>
