<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team Members</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; }
        .team-section { padding: 40px 20px; }
        .team-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .member-card {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .member-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .member-card h4 { margin: 15px 0 5px; }
        .member-card p { color: #777; font-size: 14px; margin-bottom: 15px; }
        .social-icons span { margin: 0 5px; cursor: pointer; color: #555; }
    </style>
</head>
<body>
    <div class="team-section">
        <h2>Our Team Members</h2>
        <div class="team-container">
            <div class="member-card">
                <img src="/1/download (1).jpg" alt="Member">
                <h4>Asman</h4>
                <p>Programmer</p>
                <div class="social-icons"><span>🌐</span><span>✉️</span><span>📞</span></div>
            </div>
            <div class="member-card">
                <img src="/1/download (2).jpg" alt="Member">
                <h4>Sushil</h4>
                <p>Designer</p>
                <div class="social-icons"><span>🌐</span><span>✉️</span><span>📞</span></div>
            </div>
            <div class="member-card">
                <img src="/1/download (3).jpg" alt="Member">
                <h4>Prasiddhi</h4>
                <p>Developer</p>
                <div class="social-icons"><span>🌐</span><span>✉️</span><span>📞</span></div>
            </div>
            <div class="member-card">
                <img src="/1/images.jpg" alt="Member">
                <h4>Naman</h4>
                <p>Programmer</p>
                <div class="social-icons"><span>🌐</span><span>✉️</span><span>📞</span></div>
            </div>
        </div>
    </div>
</body>
</html>
