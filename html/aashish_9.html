<!DOCTYPE html>
<head>
<title>Navigation Menu</title>
<style>
ul{
list-style:none;
margin:0;
padding:0;
background:yellow;
overflow:hidden;
}
li{
float:left;
border-right:1px solid black;
}
li a{
display:block;
padding:15px 25px;
text-decoration:none;
color:black;
}
.active{
background:blue;
color:white;
}
</style>
</head>
<body>
<ul>
<li><a class="active" href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>
</body>
</html>
