<!DOCTYPE html>
<head>
<title>List Structure</title>
</head>
<body>
<ol type="I">
<li>List Item 1
    <ol>
        <li>Nested Item 1.1</li>
        <li>Nested Item 1.2</li>
    </ol>
</li>
<li>List Item 2
    <ol>
        <li>Nested Item 2.1</li>
        <li>Nested Item 2.2
            <ul>
                <li>Nested Item 2.2.1</li>
                <li>Nested Item 2.2.2</li>
            </ul>
        </li>
    </ol>

</li>
<li>List Item 3
<ul>
<li>Nested Item 3.1</li>
<li>Nested Item 3.2</li>
<li>Nested Item 3.3</li>
</ul>
</li>
</ol>
</body>
</html>
