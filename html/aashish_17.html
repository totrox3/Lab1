<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Image Overlay Hover</title>
    <style>
        .card-container {
            position: relative;
            width: 300px;
            height: 400px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            height: 100%; width: 100%;
            opacity: 0;
            transition: .5s ease;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card-container:hover .overlay {
            opacity: 1;
        }
        .btn-read {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="/1/nature.jpg" alt="Tree" class="card-image">
        <div class="overlay">
            <h3>Card Title</h3>
            <p>This is a short description about the image overlay.</p>
            <button class="btn-read">Read More</button>
        </div>
    </div>

</body>
</html>
