<!DOCTYPE html>
<head>
<title>Dropdown Menu</title>
<style>
    body{
        background: purple;
    }
ul{
list-style:none;
margin:0;
padding:0;
background:white;
}
ul li{
float:left;
position:relative;
width:120px;
text-align:center;
}
ul li a{
display:block;
padding:15px;
text-decoration:none;
background:white;
color:black;
}
ul li ul{
display:none;
position:absolute;
top:100%;
left:0;
}
ul li:hover ul{
display:block;
}
ul li ul li{
float:none;
background:white;
}
</style>
</head>
<body>
<ul>
<li><a href="#">Home</a></li>
<li>
<a href="#">Services</a>
<ul>
<li><a href="#">Design</a></li>
<li><a href="#">Development</a></li>
<li><a href="#">Accessibility</a></li>
<li><a href="#">Content Strategy</a></li>
<li><a href="#">Training</a></li>
</ul>
</li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">About</a></li>
</ul>
</body>
</html>
